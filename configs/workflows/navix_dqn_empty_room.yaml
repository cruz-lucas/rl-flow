name: navix_dqn_empty_room
description: Small Navix EmptyRoom DQN workflow used by tests and examples.
nodes:
  - id: env
    component: navix.env.grid
    position: {x: 0, y: 0}
    config:
      env_name: empty_room
      size: 5
      layout: fixed
      observation_mode: symbolic
      action_set: cardinal
      max_steps: 20
  - id: agent
    component: builtin.agent.dqn_jax
    position: {x: 0, y: 100}
    config:
      learning_rate: 0.001
      discount: 0.99
      hidden_units: [16]
      epsilon_start: 0.1
      epsilon_end: 0.1
      epsilon_decay_steps: 1
      eps_start: 0.1
      eps_end: 0.1
      eps_decay_steps: 1
      target_update_frequency: 4
      target_update_freq: 4
      update_frequency: 1
      normalize_observations: true
  - id: replay
    component: builtin.replay.uniform
    position: {x: 0, y: 200}
    config:
      capacity: 64
      batch_size: 4
      min_size: 64
      updates_per_step: 1
      save_dataset_path: ""
  - id: runner
    component: builtin.runner.tabular_jax
    position: {x: 300, y: 100}
    config:
      seed: 0
      train_episodes: 2
      train_steps: null
      max_episode_steps: 4
      eval_episodes: 1
      checkpoint_freq: null
      checkpoint_dir: checkpoints
      save_final_checkpoint: false
edges:
  - from_node: env
    from_port: environment
    to_node: runner
    to_port: environment
  - from_node: agent
    from_port: agent
    to_node: runner
    to_port: agent
  - from_node: replay
    from_port: replay_buffer
    to_node: runner
    to_port: replay_buffer
