name: tabular_sarsa_gridworld
description: Small Gridworld SARSA workflow used by tests and examples.
nodes:
  - id: env
    component: builtin.env.gridworld
    position: {x: 0, y: 0}
    config:
      width: 4
      height: 4
      start_state: 0
      goal_state: 15
      pit_states: []
      goal_reward: 1.0
      pit_reward: -1.0
      step_reward: -0.01
      slip_probability: 0.0
  - id: agent
    component: builtin.agent.sarsa_tabular
    position: {x: 0, y: 100}
    config:
      learning_rate: 0.2
      discount: 0.99
      initial_q: 0.0
  - id: policy
    component: builtin.policy.ucb
    position: {x: 0, y: 200}
    config:
      coefficient: 1.0
      initial_count: 1.0
  - id: runner
    component: builtin.runner.tabular_jax
    position: {x: 300, y: 100}
    config:
      seed: 0
      train_episodes: 10
      train_steps: null
      max_episode_steps: 20
      eval_episodes: 2
      checkpoint_freq: null
      checkpoint_dir: checkpoints
      save_final_checkpoint: false
edges:
  - from_node: env
    from_port: environment
    to_node: runner
    to_port: environment
  - from_node: agent
    from_port: agent
    to_node: runner
    to_port: agent
  - from_node: policy
    from_port: policy
    to_node: runner
    to_port: policy
