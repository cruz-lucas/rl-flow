name: tabular_collect_riverswim_dataset
description: Collect a RiverSwim replay dataset with the tabular runner.
metadata:
  experiment_id: tabular-collect-riverswim-dataset
execution:
  backend: local
nodes:
  - id: env
    component: builtin.env.riverswim
    position: {x: 80, y: 80}
    config:
      random_start: true
  - id: policy
    component: builtin.policy.epsilon_greedy
    position: {x: 80, y: 260}
    config:
      epsilon: 0.3
      eval_epsilon: 0.0
  - id: agent
    component: builtin.agent.q_learning_tabular
    position: {x: 360, y: 80}
    config:
      learning_rate: 0.05
      discount: 0.99
  - id: replay
    component: builtin.replay.tabular_uniform
    position: {x: 360, y: 260}
    config:
      capacity: 2048
      batch_size: 16
      min_size: 16
      updates_per_step: 0
      save_dataset_path: datasets/replay.npz
      load_dataset_path: ""
      offline_only: false
      offline_updates: 0
  - id: runner
    component: builtin.runner.tabular_jax
    position: {x: 660, y: 150}
    config:
      seed: 7
      train_episodes: 100
      max_episode_steps: 50
      eval_episodes: 0
      save_final_checkpoint: false
edges:
  - from_node: env
    from_port: environment
    to_node: runner
    to_port: environment
  - from_node: policy
    from_port: policy
    to_node: runner
    to_port: policy
  - from_node: agent
    from_port: agent
    to_node: runner
    to_port: agent
  - from_node: replay
    from_port: replay_buffer
    to_node: runner
    to_port: replay_buffer
