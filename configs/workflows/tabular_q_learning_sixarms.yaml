name: tabular_q_learning_sixarms
description: Small SixArms Q-learning workflow used by tests and examples.
nodes:
  - id: env
    component: builtin.env.sixarms
    position: {x: 0, y: 0}
    config:
      success_probabilities: [1.0, 0.15, 0.1, 0.05, 0.03, 0.01]
      arm_rewards: [0.0, 50.0, 133.0, 300.0, 800.0, 1660.0, 6000.0]
  - id: agent
    component: builtin.agent.q_learning_tabular
    position: {x: 0, y: 100}
    config:
      learning_rate: 0.2
      discount: 0.99
      initial_q: 0.0
  - id: policy
    component: builtin.policy.epsilon_greedy
    position: {x: 0, y: 200}
    config:
      epsilon: 0.1
      eval_epsilon: 0.0
  - id: runner
    component: builtin.runner.tabular_jax
    position: {x: 300, y: 100}
    config:
      seed: 0
      train_episodes: 10
      train_steps: null
      max_episode_steps: 20
      eval_episodes: 2
      checkpoint_freq: null
      checkpoint_dir: checkpoints
      save_final_checkpoint: false
edges:
  - from_node: env
    from_port: environment
    to_node: runner
    to_port: environment
  - from_node: agent
    from_port: agent
    to_node: runner
    to_port: agent
  - from_node: policy
    from_port: policy
    to_node: runner
    to_port: policy
