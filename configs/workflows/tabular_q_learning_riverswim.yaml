name: tabular_q_learning_riverswim
description: Small RiverSwim Q-learning workflow used by tests and examples.
nodes:
  - id: env
    component: builtin.env.riverswim
    position: {x: 0, y: 0}
    config:
      num_states: 6
      start_state: 1
      random_start: true
      p_left: 0.1
      p_stay: 0.6
      p_right: 0.3
      easy_reward: 5.0
      hard_reward: 10000.0
      common_reward: 0.0
  - id: agent
    component: builtin.agent.q_learning_tabular
    position: {x: 0, y: 100}
    config:
      learning_rate: 0.2
      discount: 0.99
      initial_q: 0.0
  - id: policy
    component: builtin.policy.epsilon_greedy
    position: {x: 0, y: 200}
    config:
      epsilon: 0.1
      eval_epsilon: 0.0
  - id: runner
    component: builtin.runner.tabular_jax
    position: {x: 300, y: 100}
    config:
      seed: 0
      train_episodes: 20
      train_steps: null
      max_episode_steps: 20
      eval_episodes: 2
      checkpoint_freq: null
      checkpoint_dir: checkpoints
      save_final_checkpoint: true
edges:
  - from_node: env
    from_port: environment
    to_node: runner
    to_port: environment
  - from_node: agent
    from_port: agent
    to_node: runner
    to_port: agent
  - from_node: policy
    from_port: policy
    to_node: runner
    to_port: policy
