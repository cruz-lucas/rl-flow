name: tabular_q_learning_riverswim
description: Builtin JAX tabular Q-learning on the RiverSwim benchmark.
metadata:
  experiment_id: tabular-q-learning-riverswim
execution:
  backend: local
nodes:
  - id: env
    component: builtin.env.riverswim
    position: {x: 80, y: 80}
    config:
      random_start: true
  - id: policy
    component: builtin.policy.epsilon_greedy
    position: {x: 80, y: 260}
    config:
      epsilon: 0.2
      eval_epsilon: 0.0
  - id: agent
    component: builtin.agent.q_learning_tabular
    position: {x: 360, y: 80}
    config:
      learning_rate: 0.05
      discount: 0.99
  - id: runner
    component: builtin.runner.tabular_jax
    position: {x: 660, y: 150}
    config:
      seed: 4
      train_episodes: 120
      max_episode_steps: 50
      eval_episodes: 10
      save_final_checkpoint: true
edges:
  - from_node: env
    from_port: environment
    to_node: runner
    to_port: environment
  - from_node: policy
    from_port: policy
    to_node: runner
    to_port: policy
  - from_node: agent
    from_port: agent
    to_node: runner
    to_port: agent
