name: navix_dqn_rmax_countbasedoracle_hparam_sweep
description: Example SLURM array sweep for Compute Canada / Alliance clusters.
sweep_id: dqn-rmax-countbasedoracle-fourrooms-hparam-sweep
workflow: ../workflows/fourrooms/corner_distractor/dqn_rmax_countbasedoracle.yaml

method: random
num_trials: 200
seed: 0

metric:
  goal: maximize
  name: mean_train_return

execution:
  backend: slurm
  options:
    account: aip-machado
    time: "08:00:00"
    cpus_per_task: 2
    gpus: l40s.4:1
    mem: 4G
    modules:
      - python/3.11
      - cuda/13.2
      
slurm:
  max_parallel: 200
  trials_per_task: 3
  max_array_tasks: 1000

parameters:
  learning_rate:
    target: nodes.agent-1.config.learning_rate
    distribution: loguniform
    minimum: 0.00001
    maximum: 0.01
  batch_size:
    target: nodes.replay_buffer-3.config.batch_size
    values: [32, 64, 128, 256, 512, 1024, 2048]
  buffer_size:
    target: nodes.replay_buffer-3.config.capacity
    values: [8192, 16384, 32768, 65536, 131072]
  target_update_frequency:
    target: nodes.agent-1.config.target_update_frequency
    values: [32, 64, 128, 256, 512, 1024, 2048]
  normalize_observations:
    target: nodes.agent-1.config.normalize_observations
    values: [true, false]
  rmax_update_v_max:
    target: nodes.agent-1.config.rmax_update_v_max
    values: [0.5, 1]
  rmax_bonus_threshold:
    target: nodes.agent-1.config.rmax_bonus_threshold
    values: [0.1, 0.15, 0.2, 0.3, 0.4, 0.5, 0.8, 0.9, 1.0]
  updates_per_step:
    target: nodes.replay_buffer-3.config.updates_per_step
    values: [1, 5, 10, 20, 50, 100]
  seed:
    target: nodes.runner-4.config.seed
    values: [0, 1, 2]
