name: navix_dqn_hparam_sweep
description: Example SLURM array sweep for Compute Canada / Alliance clusters.
sweep_id: navix-dqn-hparam-sweep
workflow: ../workflows/16x16_emptyroom_symbolic_cardinal_cornerdistractor__dqn_rmax_countbasedoracle.yaml
method: grid
metric:
  goal: maximize
  last_n: 500
  name: mean_train_return_last_n
execution:
  backend: slurm
  options:
    account: def-machado
    time: "03:00:00"
    cpus_per_task: 4
    mem: 16G
    modules:
      - python/3.11
    env:
      XLA_PYTHON_CLIENT_PREALLOCATE: "false"
    preamble:
      - echo "Running ${SLURM_ARRAY_JOB_ID}_${SLURM_ARRAY_TASK_ID} on $(hostname)"
slurm:
  max_parallel: 8
parameters:
  learning_rate:
    target: nodes.agent-1.config.learning_rate
    values: [0.00003, 0.0001, 0.0003, 0.0005, 0.001]
  batch_size:
    target: nodes.replay_buffer-3.config.batch_size
    values: [32, 64, 128, 256]
  buffer_size:
    target: nodes.replay_buffer-3.config.buffer_size
    values: [10000, 50000, 100000]
  target_update_freq:
    target: nodes.agent-1.config.target_update_freq
    values: [512, 1024, 2048]
  normalize_observations:
    target: nodes.agent-1.config.normalize_observations
    values: [true, false]
  rmax_bonus_threshold:
    target: nodes.agent-1.config.rmax_bonus_threshold
    values: [0.1, 0.3, 0.5, 0.8, 0.9]
  seed:
    target: nodes.runner-4.config.seed
    values: [0, 1, 2, 3, 4]
