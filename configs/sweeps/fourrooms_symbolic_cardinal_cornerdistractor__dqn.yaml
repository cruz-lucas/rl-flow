name: navix_dqn_hparam_sweep
description: Example SLURM array sweep for Compute Canada / Alliance clusters.
sweep_id: dqn-fourrooms-hparam-sweep
workflow: ../workflows/fourrooms/corner_distractor/dqn.yaml

method: random
num_trials: 200
seed: 0

metric:
  goal: maximize
  name: mean_train_return

execution:
  backend: slurm
  options:
    account: aip-machado
    time: "08:00:00"
    cpus_per_task: 2
    gpus: l40s.4:1
    mem: 4G
    modules:
      - python/3.11
      - cuda/13.2

slurm:
  max_parallel: 200
  trials_per_task: 3
  max_array_tasks: 1000

parameters:
  learning_rate:
    target: nodes.agent-1.config.learning_rate
    distribution: loguniform
    minimum: 0.00001
    maximum: 0.01
  epsilon_decay_steps:
    target: nodes.agent-1.config.epsilon_decay_steps
    values: [25000, 50000, 75000, 100000, 200000, 300000, 500000]
  epsilon_end:
    target: nodes.agent-1.config.epsilon_end
    values: [0.001, 0.01, 0.02, 0.05, 0.1]
  target_update_frequency:
    target: nodes.agent-1.config.target_update_frequency
    values: [128, 256, 512, 1024, 2048]
  update_frequency:
    target: nodes.agent-1.config.update_frequency
    values: [1, 2, 4, 8, 16]
  batch_size:
    target: nodes.replay_buffer-3.config.batch_size
    values: [32, 64, 128, 256, 1024, 2048]
  capacity:
    target: nodes.replay_buffer-3.config.capacity
    values: [8192, 16384, 32768, 65536, 131072]
  seed:
    target: nodes.runner-4.config.seed
    values: [0, 1, 2]
